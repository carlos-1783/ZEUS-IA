# Producción: UN servicio con Dockerfile en la RAÍZ del repo (build Vite + FastAPI).
# Si en Railway "Root Directory" está en `backend/`, el Dockerfile no se usa y NO hay SPA →
# deja Root Directory vacío o "." para que exista el Dockerfile y la carpeta frontend/.
#
# Variable opcional: ZEUS_FRONTEND_STATUS=1 → GET /_zeus/frontend-status (JSON: index_html, static_dir).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Stamp condicional (legacy: tablas sin fila en alembic_version) y luego upgrade.
# SKIP_DB_MIGRATE=1 salta migraciones pero arranca Gunicorn.
startCommand = "sh -c 'if [ \"${SKIP_DB_MIGRATE}\" != \"1\" ] && [ \"${SKIP_DB_MIGRATE}\" != \"true\" ]; then python scripts/alembic_conditional_stamp.py && alembic upgrade head; fi && exec gunicorn -c gunicorn.conf.py app.main:app'"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
