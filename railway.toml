# ZEUS-IA — despliegue en UN servicio (API + SPA desde el Dockerfile de la raíz).
# El build multi-stage copia frontend/dist → backend/static en la imagen.
#
# Si necesitas un segundo servicio solo para el SPA, créalo en el dashboard de Railway
# (source: frontend/, build: npm ci && npm run build, start: npx serve dist -s).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "gunicorn -c gunicorn.conf.py app.main:app"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
